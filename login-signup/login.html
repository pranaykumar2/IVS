<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMS | Login</title>
    <link rel="stylesheet" href="login-style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="icon" type="text/css" href="https://i.ibb.co/tYcdLH4/lib-circle-logo-yellowonblack.png">

  </head>
  <body>
      <div class="container" id="container">
          <div class="form-container sign-up">
              <form action="" method="">
                  <h1 style="margin-bottom: 25px;">Create Account</h1>
                  <span>Thanks for having us!!</span>
                  <input type="text" placeholder="Name">
                  <input type="email" placeholder="Email" id="email">
                  <input type="password" placeholder="Password" id="password">
                  <button id="submitData">Sign Up</button>
              </form>
          </div>
          <div class="form-container sign-in">
              <form>
                  <h1 style="margin-bottom: 25px;">Sign In</h1>
                  <span>Hey there!! Welcome back</span>
                  <input id = "get-email" type="email" placeholder="Email">
                  <input id="get-pass" type="password" placeholder="Password">
                  <a href="#">Forget Your Password?</a>
                  <button id="retrieveData">Sign In</button>
              </form>
          </div>
          <div class="toggle-container">
              <div class="toggle">
                  <div class="toggle-panel toggle-left">
                      <h1>Already a User?</h1>
                      <p>Enter your personal details to use all of site features</p>
                      <button class="hidden" id="login">Sign In</button>
                  </div>
                  <div class="toggle-panel toggle-right">
                      <h1>Hello, Friend!</h1>
                      <p>Register with your personal details to use all of site features</p>
                      <button class="hidden" id="register">Sign Up</button>
                  </div>
              </div>
          </div>
      </div>

      <script src="login-script.js"></script>
      <script type="module">
          // Import the functions you need from the SDKs you need

          import { getDatabases } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";
          import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.j";
          // TODO: Add SDKs for Firebase products that you want to use
          // https://firebase.google.com/docs/web/setup#available-libraries

          // Your web app's Firebase configuration
          // For Firebase JS SDK v7.20.0 and later, measurementId is optional
          const firebaseConfig = {
            apiKey: "AIzaSyBI6LIY85E7h06TtheQmtFL9h3wk28K184",
            authDomain: "vignanidp-1.firebaseapp.com",
            databaseURL: "https://vignanidp-1-default-rtdb.firebaseio.com",
            projectId: "vignanidp-1",
            storageBucket: "vignanidp-1.appspot.com",
            messagingSenderId: "623114741374",
            appId: "1:623114741374:web:69af63b05663ca58aa5a2f",
            measurementId: "G-RYKD8J221G"
          };

          // Initialize Firebase
          const app = initializeApp(firebaseConfig);
          const analytics = getAnalytics(app);
          const database = getDatabase(app);
          const auth = getAuth();

          submitData.addEventListener("click", () => {
            var email = document.getElementById("email").value;
            var password = document.getElementById("password").value;
            createUserWithEmailAndPassword(auth, email, password)
            .then((userCredential) => {
              // Signed up
              const user = userCredential.user;
              alert("Yay!! you are in")
            })
            .catch((error) => {
              const errorCode = error.code;
              const errorMessage = error.message;
              alert("Oh!! shit")
            });
          })

    </script>
  </body>
</html>
