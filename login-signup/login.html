<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="login-style.css" />
    <title></title>
  </head>
  <body>
    <main>
        <section class="form-section">
          <div class="form-wrapper">
            <h1 class="title">Login In</h1>
            <form class="form" action="" id="login-form">
              <div class="form-group">
                <label>
                  <span class="sr-only">Email address</span>
                  <input type="email" placeholder="Email" class="form-input" required>
                </label>
              </div>
              <div class="form-group">
                <label>
                  <span class="sr-only">Password</span>
                  <input type="password" placeholder="Password" class="form-input" required="required" id="user-pass">
                </label>
              </div>

              <div class="form-group">
                <input type="submit" value="Submit" class="form-submit">
              </div>

              <footer class="form-footer">
                  <div>
                    <a href="#" class="form-link">Forgot password?</a>
                  </div>
                  <div>
                    New here?
                    <a href="signup.html" class="form-link">Create Account</a>
                  </div>
              </footer>
            </form>
          </div>
        </section>
      </main>
  </body>
</html>
