<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignUp | Login</title>
    <link rel="stylesheet" href="login-style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="icon" type="text/css" href="https://i.ibb.co/tYcdLH4/lib-circle-logo-yellowonblack.png">
  </head>
  <body>
      <div class="container" id="container">
          <div class="form-container sign-up">
              <form>
                  <h1>Create Account</h1>
                  <span>We are happy to have you with us!!</span>
                  <input style="margin-top: 25px;" type="text" placeholder="Name">
                  <input type="email" placeholder="Email">
                  <input type="password" placeholder="Password">
                  <button>Sign Up</button>
              </form>
          </div>
          <div class="form-container sign-in">
              <form>
                  <h1>Sign In</h1>
                 <span>Welcome back!!</span>
                  <input style="margin-top: 25px;" type="email" placeholder="Email">
                  <input type="password" placeholder="Password">
                  <a href="#">Forget Your Password?</a>
                  <button>Sign In</button>
              </form>
          </div>
          <div class="toggle-container">
              <div class="toggle">
                  <div class="toggle-panel toggle-left">
                      <h1>Already a User?</h1>
                      <p>Enter your personal details to use all of site features</p>
                      <button class="hidden" id="login">Sign In</button>
                  </div>
                  <div class="toggle-panel toggle-right">
                      <h1>Hello, Friend!</h1>
                      <p>Register with your personal details to use all of site features</p>
                      <button class="hidden" id="register">Sign Up</button>
                  </div>
              </div>
          </div>
      </div>

      <script src="login-script.js"></script>
  </body>
</html>
